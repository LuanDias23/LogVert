<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogVert | Recuperar Senha</title>
    <link rel="icon" type="image/png" href="/assets/logosemfundo.png">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/pages/esqueci_senha.lojista/esqueci_senha.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

    <div id="esqueci-senha-particles"></div>

    <a href="/pages/login/login.html" class="back-to-login" title="Voltar para o Login">
        <i class="fas fa-arrow-left"></i>
        <span>Voltar</span>
    </a>

    <div class="page-container">
        <div class="forgot-card lojista">
            <div class="card-content">
                <img src="/assets/logosemfundo.png" alt="Logo LogVert" class="logo">
                <h2>Recuperar Senha</h2>

                <!-- Mensagem de feedback global -->
                <span id="recovery-message" class="form-message"></span>

                <!-- Etapa 1: Solicitar código de recuperação -->
                <div id="step-email">
                    <p>Digite seu e-mail cadastrado para receber o código de recuperação.</p>
                    <form id="form-email">
                        <div class="input-group">
                            <label for="recovery-email">E-mail</label>
                            <input type="email" id="recovery-email" required placeholder="seu@email.com">
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <span class="btn-text">Enviar Código</span>
                            <span class="btn-spinner" style="display:none;"></span>
                        </button>
                    </form>
                </div>

                <!-- Etapa 2: Validar código de recuperação -->
                <div id="step-code" style="display: none;">
                    <p>Digite o código de 6 dígitos enviado para o seu e-mail.</p>
                    <form id="form-code">
                        <div class="input-group">
                            <label for="recovery-code">Código de Recuperação</label>
                            <input type="text" id="recovery-code" required placeholder="123456" maxlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <span class="btn-text">Validar Código</span>
                            <span class="btn-spinner" style="display:none;"></span>
                        </button>
                    </form>
                </div>

                <!-- Etapa 3: Definir nova senha -->
                <div id="step-password" style="display: none;">
                    <p>Defina sua nova senha. A senha deve ter no mínimo 8 caracteres.</p>
                    <form id="form-password">
                        <div class="input-group">
                            <label for="new-password">Nova Senha</label>
                            <input type="password" id="new-password" required minlength="8"
                                placeholder="Mínimo 8 caracteres">
                        </div>
                        <div class="input-group">
                            <label for="confirm-password">Confirmar Senha</label>
                            <input type="password" id="confirm-password" required minlength="8"
                                placeholder="Repita a senha">
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <span class="btn-text">Atualizar Senha</span>
                            <span class="btn-spinner" style="display:none;"></span>
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>
    <footer class="global-footer" style="position: fixed; bottom: 0; left: 0; width: 100%; z-index: 10;">
        <p>&copy; 2025 LogVert. Todos os direitos reservados.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="/js/api/apiClient.js"></script>
    <script src="/pages/esqueci_senha.lojista/esqueci_senha.js"></script>
</body>

</html>
